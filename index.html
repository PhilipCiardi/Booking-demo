<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookning-Demo</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Inter", sans-serif;
      color: rgba(255,255,255,0.88);
      background: #1c140f;
    }

    .page {
      height: 100vh;
      position: relative;
      background:
        linear-gradient(90deg, rgba(86,58,36,0.75) 0%, rgba(100,68,42,0.45) 45%, rgba(20,12,8,0.10) 100%),
        linear-gradient(180deg, rgba(235,190,130,0.18) 0%, rgba(35,20,12,0.30) 100%),
        url("https://images.unsplash.com/photo-1515377905703-c4788e51af15?auto=format&fit=crop&w=1800&q=95");
      background-size: cover;
      background-position: center right;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 44%, rgba(255,215,160,0.20), transparent 26%),
        radial-gradient(circle at 85% 20%, rgba(255,230,185,0.10), transparent 22%);
      pointer-events: none;
    }

    header {
      position: relative;
      z-index: 2;
      height: 92px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 72px;
    }

    .logo {
      font-family: "Cormorant Garamond", serif;
      font-size: 32px;
      color: rgba(255,255,255,0.82);
    }

    nav {
      display: flex;
      gap: 48px;
    }

    nav a {
      color: rgba(255,255,255,0.74);
      text-decoration: none;
      font-size: 20px;
      font-weight: 300;
    }

    .content {
      position: relative;
      z-index: 2;
      height: calc(100vh - 92px);
      width: min(100% - 48px, 1180px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 500px 1fr;
      align-items: center;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(44px, 4.8vw, 66px);
      font-weight: 400;
      line-height: 0.95;
      margin-bottom: 20px;
      color: rgba(255,255,255,0.82);
    }

    .lead {
      max-width: 430px;
      color: rgba(255,255,255,0.66);
      font-size: 19px;
      font-weight: 300;
      line-height: 1.55;
      margin-bottom: 26px;
    }

    form {
      width: 100%;
      max-width: 480px;
      display: grid;
      gap: 11px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 46px;
      border-bottom: 1px solid rgba(255,255,255,0.14);
    }

    .icon {
      width: 20px;
      opacity: 0.55;
      font-size: 18px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: rgba(255,255,255,0.82);
      font: inherit;
      font-size: 17px;
      font-weight: 300;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255,255,255,0.58);
    }

    select {
      appearance: none;
      color: rgba(255,255,255,0.62);
    }

    textarea {
      min-height: 54px;
      resize: none;
      padding-top: 14px;
    }

    button {
      margin-top: 22px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.20);
      background: linear-gradient(90deg, rgba(255,220,165,0.30), rgba(255,255,255,0.16));
      color: rgba(255,255,255,0.86);
      padding: 16px 22px;
      font-size: 19px;
      font-weight: 300;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: linear-gradient(90deg, rgba(255,220,165,0.40), rgba(255,255,255,0.24));
      transform: translateY(-1px);
    }

    @media (max-width: 900px) {
      html, body {
        overflow: auto;
      }

      .page {
        min-height: 100vh;
        height: auto;
      }

      header {
        height: 78px;
        padding: 0 24px;
      }

      nav {
        display: none;
      }

      .content {
        height: auto;
        min-height: calc(100vh - 78px);
        grid-template-columns: 1fr;
        padding: 24px 0 44px;
      }

      h1 {
        font-size: 46px;
      }

      .lead {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <div class="logo">Salong Elegans</div>

      <nav>
        <a href="#">Hem</a>
        <a href="#">Tjänster</a>
        <a href="#">Kontakt</a>
      </nav>
    </header>

    <section class="content">
      <div class="form-area">
        <h1>Boka din frisörtid</h1>

        <p class="lead">
          Fyll i formuläret nedan för att boka en tid hos oss.
          Vi hör av oss inom kort.
        </p>

        <form>
          <div class="field">
            <span class="icon">♙</span>
            <input type="text" placeholder="Namn" />
          </div>

          <div class="field">
            <span class="icon">☏</span>
            <input type="tel" placeholder="Telefonnummer" />
          </div>

          <div class="field">
            <span class="icon">□</span>
            <select>
              <option>Önskad tjänst</option>
              <option>Klippning</option>
              <option>Färgning</option>
              <option>Konsultation</option>
            </select>
          </div>

          <div class="field">
            <span class="icon">○</span>
            <input type="datetime-local" />
          </div>

          <div class="field">
            <span class="icon">☰</span>
            <textarea placeholder="Meddelande"></textarea>
          </div>

          <button type="submit">Skicka förfrågan</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
