<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boka behandling</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5efeb, #e9d9d2);
      color: #3B1B1E;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(59, 27, 30, 0.10);
    }

    .top {
      margin-bottom: 28px;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      text-decoration: none;
      color: #3B1B1E;
      font-size: 14px;
      opacity: 0.8;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .subtext {
      font-size: 17px;
      line-height: 1.6;
      color: #4b2a2d;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin: 30px 0 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .option {
      background: #fff;
      border: 2px solid rgba(59, 27, 30, 0.10);
      border-radius: 18px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .option:hover {
      border-color: #3B1B1E;
      transform: translateY(-2px);
    }

    .option h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .option p {
      font-size: 14px;
      opacity: 0.8;
    }

    .times {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .time {
      padding: 12px 18px;
      background: #fff;
      border: 2px solid rgba(59, 27, 30, 0.10);
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
    }

    .time:hover {
      border-color: #3B1B1E;
      transform: translateY(-2px);
    }

    .cta {
      margin-top: 34px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 24px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: #3B1B1E;
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: #3B1B1E;
      border: 2px solid #3B1B1E;
    }

    @media (max-width: 768px) {
      .wrapper {
        padding: 26px;
      }

      h1 {
        font-size: 30px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .cta {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <div class="top">
      <a class="back" href="/">← Tillbaka</a>
      <h1>Boka behandling</h1>
      <p class="subtext">
        Välj behandling och tid. Enkelt, snabbt och tydligt.
      </p>
    </div>

    <section>
      <div class="section-title">1. Välj behandling</div>
      <div class="grid">
        <div class="option">
          <h3>Massage</h3>
          <p>60 min</p>
        </div>
        <div class="option">
          <h3>Ansiktsbehandling</h3>
          <p>45 min</p>
        </div>
        <div class="option">
          <h3>Spa Deluxe</h3>
          <p>90 min</p>
        </div>
      </div>
    </section>

    <section>
      <div class="section-title">2. Välj tid</div>
      <div class="times">
        <div class="time">10:00</div>
        <div class="time">11:30</div>
        <div class="time">13:00</div>
        <div class="time">14:30</div>
        <div class="time">16:00</div>
        <div class="time">17:30</div>
      </div>
    </section>

    <div class="cta">
      <button class="btn btn-primary">Fortsätt</button>
      <a href="/" class="btn btn-secondary">Avbryt</a>
    </div>
  </main>
</body>
</html>
